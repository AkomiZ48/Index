function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}

// --- Calculs métier ---
function toMinutes(t) { var p = t.split(":"); return parseInt(p[0], 10) * 60 + parseInt(p[1], 10); }
function durationMinutes(start, end) { var d = toMinutes(end) - toMinutes(start); if (d <= 0) d += 24 * 60; return d; }
var OVERTIME_WINDOWS = [[11 * 60 + 30, 13 * 60 + 30], [16 * 60 + 30, 24 * 60]];
function overlapMinutes(aS, aE, bS, bE) { return Math.max(0, Math.min(aE, bE) - Math.max(aS, bS)); }
function overtimeMinutes(start, end) {
  var s = toMinutes(start), e = toMinutes(end);
  if (e <= s) e += 24 * 60;
  var total = 0, days = Math.ceil(e / (24 * 60)) + 1;
  for (var d = 0; d < days; d++) {
    var offset = d * 24 * 60;
    OVERTIME_WINDOWS.forEach(function (w) { total += overlapMinutes(s, e, offset + w[0], offset + w[1]); });
  }
  return total;
}
function fmtDuration(min) { var h = Math.floor(min / 60), m = min % 60; return m > 0 ? h + "h" + String(m).padStart(2, "0") : h + "h"; }
function fmtDateShort(dateStr) { var d = new Date(dateStr + "T00:00:00"); return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "short" }); }
function monthKey(dateStr) { return dateStr.slice(0, 7); }
function monthLabel(key) { var d = new Date(key + "-01T00:00:00"); var l = d.toLocaleDateString("fr-FR", { month: "long", year: "numeric" }); return l.charAt(0).toUpperCase() + l.slice(1); }
function genId() { return Date.now() + "-" + Math.random().toString(36).slice(2, 8); }
function todayISO() { return new Date().toISOString().slice(0, 10); }

function compressImage(file, maxDim, quality) {
  maxDim = maxDim || 1000; quality = quality || 0.6;
  return new Promise(function (resolve, reject) {
    var reader = new FileReader();
    reader.onload = function (e) {
      var img = new Image();
      img.onload = function () {
        var w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; } else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        var canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = function () { reject(new Error("Image illisible")); };
      img.src = e.target.result;
    };
    reader.onerror = function () { reject(new Error("Lecture du fichier impossible")); };
    reader.readAsDataURL(file);
  });
}
function dataUrlToBlob(dataUrl) {
  var parts = dataUrl.split(",");
  var mimeMatch = parts[0].match(/data:(.*);base64/);
  var mime = mimeMatch ? mimeMatch[1] : "image/jpeg";
  var binary = atob(parts[1]);
  var arr = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

// --- Accès Supabase ---
function sbFetchEntries() {
  return sb.from("interventions").select("*").order("date", { ascending: false }).order("start_time", { ascending: false })
    .then(function (res) {
      if (res.error) throw res.error;
      return res.data.map(function (row) {
        return { id: row.id, date: row.date, start: row.start_time, end: row.end_time, lieu: row.lieu || "", client: row.client || "", notes: row.notes || "", orSaved: !!row.or_saved, orNumber: row.or_number || "", facturable: row.facturable !== false, category: row.category || "" };
      });
    });
}
function sbUpsertEntry(entry) {
  return sb.from("interventions").upsert({
    id: entry.id, date: entry.date, start_time: entry.start, end_time: entry.end,
    lieu: entry.lieu || null, client: entry.client || null, notes: entry.notes || null, or_saved: !!entry.orSaved, or_number: entry.orNumber || null, facturable: entry.facturable !== false, category: entry.category || null
  }).then(function (res) { if (res.error) throw res.error; });
}
function sbDeleteEntry(id) {
  return sb.from("interventions").delete().eq("id", id).then(function (res) { if (res.error) throw res.error; });
}
function sbUploadPhoto(entryId, uid, dataUrl) {
  var blob = dataUrlToBlob(dataUrl);
  var path = entryId + "/" + uid + ".jpg";
  return sb.storage.from(PHOTOS_BUCKET).upload(path, blob, { contentType: "image/jpeg", upsert: true })
    .then(function (res) {
      if (res.error) throw res.error;
      return sb.storage.from(PHOTOS_BUCKET).getPublicUrl(path).data.publicUrl;
    });
}
function sbListPhotos(entryId) {
  return sb.storage.from(PHOTOS_BUCKET).list(entryId, { limit: 100 }).then(function (res) {
    if (res.error || !res.data) return [];
    return res.data.map(function (it) {
      var url = sb.storage.from(PHOTOS_BUCKET).getPublicUrl(entryId + "/" + it.name).data.publicUrl;
      return { uid: it.name.replace(/\.jpg$/, ""), dataUrl: url, status: "ok" };
    });
  }).catch(function () { return []; });
}
function sbDeletePhoto(entryId, uid) {
  return sb.storage.from(PHOTOS_BUCKET).remove([entryId + "/" + uid + ".jpg"]).catch(function () {});
}
function sbDeleteAllPhotos(entryId) {
  return sbListPhotos(entryId).then(function (photos) {
    if (!photos.length) return;
    return sb.storage.from(PHOTOS_BUCKET).remove(photos.map(function (p) { return entryId + "/" + p.uid + ".jpg"; }));
  });
}

// --- Cache local & file d'attente hors-ligne ---
var CACHE_KEY = "carnet:cache:entries";
var QUEUE_KEY = "carnet:pendingSync";

function saveCache(entries) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(entries)); } catch (e) {}
}
function loadCache() {
  try {
    var raw = localStorage.getItem(CACHE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function getQueue() {
  try {
    var raw = localStorage.getItem(QUEUE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function setQueue(q) {
  try { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); } catch (e) {}
}
function queueAdd(item) {
  var q = getQueue();
  // si une fiche identique est déjà en attente, on la remplace par la version la plus récente
  q = q.filter(function (it) { return !(it.type === item.type && it.id === item.id); });
  q.push(item);
  setQueue(q);
}
function flushQueue() {
  var q = getQueue();
  if (!q.length || !navigator.onLine) return Promise.resolve();
  var remaining = [];
  var chain = Promise.resolve();
  q.forEach(function (item) {
    chain = chain.then(function () {
      var op;
      if (item.type === "upsert") op = sbUpsertEntry(item.payload);
      else if (item.type === "delete") op = sbDeleteEntry(item.id).then(function () { return sbDeleteAllPhotos(item.id); });
      else op = Promise.resolve();
      return op.catch(function () { remaining.push(item); });
    });
  });
  return chain.then(function () {
    setQueue(remaining);
    return remaining.length;
  });
}

function hourMeterHTML(totalMinutes, label, color, hourDigits) {
  var h = Math.floor(totalMinutes / 60), m = totalMinutes % 60;
  var hStr = String(Math.min(h, Math.pow(10, hourDigits) - 1)).padStart(hourDigits, "0");
  function digits(str) {
    return str.split("").map(function (ch) {
      return '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.4ch;min-width:20px;height:32px;background:#0A2620;border:1px solid ' + COLORS.border + ';border-radius:3px;color:' + color + ';font-family:\'Space Mono\',monospace;font-weight:700;font-size:18px;box-shadow:inset 0 2px 4px rgba(0,0,0,0.5);">' + ch + '</span>';
    }).join('');
  }
  var out = '<div style="flex:1;min-width:0;background:linear-gradient(180deg,#2A3234,#1A2022);border:1px solid ' + COLORS.border + ';border-radius:10px;padding:12px 10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 4px 14px rgba(0,0,0,0.35);">';
  out += '<div style="font-family:\'Oswald\',sans-serif;font-size:10.5px;letter-spacing:0.14em;color:' + color + ';text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + esc(label) + '</div>';
  out += '<div style="display:flex;align-items:flex-end;gap:4px;"><div style="display:flex;gap:2px;">' + digits(hStr) + '</div>';
  out += '<span style="font-family:\'Space Mono\',monospace;color:' + COLORS.inkDim + ';font-size:13px;margin-bottom:5px;">h</span>';
  out += '<div style="display:flex;gap:2px;">' + digits(String(m).padStart(2, "0")) + '</div></div></div>';
  return out;
}

function digitBoxesHTML(str, color) {
  return str.split("").map(function (ch) {
    return '<span style="display:inline-flex;align-items:center;justify-content:center;width:1.4ch;min-width:20px;height:32px;background:#0A2620;border:1px solid ' + COLORS.border + ';border-radius:3px;color:' + color + ';font-family:\'Space Mono\',monospace;font-weight:700;font-size:18px;box-shadow:inset 0 2px 4px rgba(0,0,0,0.5);">' + ch + '</span>';

function csvEscape(v) {
  var s = String(v == null ? "" : v);
  if (/[",;\n]/.test(s)) s = '"' + s.replace(/"/g, '""') + '"';
  return s;
}

function exportMonthCSV(key) {
  var list = monthEntries(key);
  var rows = [["Date", "Début", "Fin", "Durée", "Heures sup.", "Lieu", "Client", "N° OR", "OR enregistré", "Facturable", "Notes"]];
  list.forEach(function (e) {
    rows.push([
      e.date, e.start, e.end, fmtDuration(durationMinutes(e.start, e.end)), fmtDuration(overtimeMinutes(e.start, e.end)),
      e.lieu || "", e.client || "", e.orNumber || "", e.orSaved ? "Oui" : "Non", e.facturable ? "Oui" : "Non", e.notes || ""
    ]);
  });
  var csv = "\uFEFF" + rows.map(function (r) { return r.map(csvEscape).join(";"); }).join("\r\n");
  var blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "interventions-" + key + ".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  area.innerHTML = html;
  window.print();
}

var FAKE_LIEUX = ["Chantier Saint-Denis", "Zone industrielle Le Port", "Chantier Sainte-Marie", "Dépôt Sainte-Suzanne", "Chantier Saint-Paul", "Chantier Saint-Pierre", "Zone artisanale Sainte-Clotilde"];
var FAKE_CLIENTS = ["Heliowatt", "SBTPC", "Vinci Construction", "Colas", "Eiffage", "M. Dupont (particulier)", "Bourbon Béton"];
var FAKE_NOTES = ["", "", "RAS", "Panne électrique résolue", "Maintenance préventive", "Casse client", "Intervention urgente", "Livraison matériel"];

function randChoice(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(min, max) { return min + Math.floor(Math.random() * (max - min + 1)); }
function pad2(n) { return String(n).padStart(2, "0"); }

function generateFakeEntries(count) {
  var out = [];
  var today = new Date();
  for (var i = 0; i < count; i++) {
    var monthsBack = randInt(0, 5);
    var d = new Date(today.getFullYear(), today.getMonth() - monthsBack, randInt(1, 28));
    var dateStr = d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
    var startH = randInt(6, 10);
    var endH = Math.min(19, startH + randInt(4, 9));
    var start = pad2(startH) + ":" + randChoice(["00", "15", "30"]);
    var end = pad2(endH) + ":" + randChoice(["00", "15", "30"]);
    var facturable = Math.random() > 0.2;
    var orSaved = Math.random() > 0.4;
    out.push({
      id: "test-" + genId(),
      date: dateStr, start: start, end: end,
      lieu: randChoice(FAKE_LIEUX), client: randChoice(FAKE_CLIENTS), notes: randChoice(FAKE_NOTES),
      orSaved: orSaved, orNumber: orSaved ? (d.getFullYear() + "-" + randInt(1000, 9999)) : "",
      facturable: facturable
    });
  }
  return out;
}

function toggleTestMode() {
  if (state.testMode) {
    // retour aux vraies données
    state.testMode = false;

    state.realEntriesBackup = null;
    state.realPhotoCountsBackup = null;
    renderRoot();
  } else {
    state.realEntriesBackup = state.entries;
    state.realPhotoCountsBackup = state.photoCounts;
    state.entries = generateFakeEntries(45);

  }
}

function loadEntries() {
  state.loading = true; state.loadError = null; renderRoot();

  if (!navigator.onLine) {
    state.entries = loadCache();
    state.offlineMode = true;
    state.loading = false;
    renderRoot();
    return;
  }

  sbFetchEntries().then(function (rows) {
    state.entries = rows;
    state.offlineMode = false;
    state.loading = false;
    saveCache(rows);
    renderRoot();
    Promise.all(rows.map(function (r) { return sbListPhotos(r.id).then(function (p) { return [r.id, p.length]; }); }))
      .then(function (pairs) {
        var counts = {};
        pairs.forEach(function (p) { counts[p[0]] = p[1]; });
        state.photoCounts = counts;
        renderRoot();
      });
  }).catch(function (e) {
    var cached = loadCache();
    if (cached.length > 0) {
      state.entries = cached;
      state.offlineMode = true;
      state.loading = false;
      renderRoot();
    } else {
      state.loadError = (e && e.message) ? e.message : String(e);
      state.loading = false;
      renderRoot();
    }
  });
}

function trySyncPending() {
  flushQueue().then(function (remaining) {
    if (remaining !== undefined) {
      state.pendingCount = remaining;
      if (remaining === 0) loadEntries();
      else renderRoot();
    }
  });
}
window.addEventListener("online", trySyncPending);

function confirmDeleteEntry(id) {
  var deletedEntry = state.entries.find(function (e) { return e.id === id; });
  if (state.testMode) {
    state.entries = state.entries.filter(function (e) { return e.id !== id; });
    state.pendingDeleteId = null;
    renderRoot();
    return;
  }
  if (!navigator.onLine) {
    state.entries = state.entries.filter(function (e) { return e.id !== id; });
    saveCache(state.entries);
    queueAdd({ type: "delete", id: id });
    state.pendingCount = getQueue().length;
    state.pendingDeleteId = null;
    renderRoot();
    if (deletedEntry) showUndoToast(deletedEntry);
    return;
  }
  sbDeleteEntry(id).then(function () { return sbDeleteAllPhotos(id); }).then(function () {
    state.pendingDeleteId = null;
    loadEntries();
    if (deletedEntry) showUndoToast(deletedEntry);
  }).catch(function () {
    // échec réseau probable : on met en file d'attente plutôt que de bloquer
    state.entries = state.entries.filter(function (e) { return e.id !== id; });
    saveCache(state.entries);
    queueAdd({ type: "delete", id: id });
    state.pendingCount = getQueue().length;
    state.pendingDeleteId = null;
    renderRoot();
  });
}

// --- Formulaire (modale) ---
function openNewForm() {
  if (state.testMode) { alert("Désactive le mode test (⚙️) pour ajouter une vraie intervention."); return; }
  form = { id: genId(), date: todayISO(), start: "08:00", end: "17:00", lieu: "", client: "", notes: "", category: "", orSaved: false, orNumber: "", facturable: true, isEditingExisting: false, photos: [], photosLoading: false, photoBusy: false, error: null, saving: false };
  renderForm();
}
function openEditForm(entry) {
  if (state.testMode) { alert("Désactive le mode test (⚙️) pour modifier tes vraies interventions."); return; }
  form = { id: entry.id, date: entry.date, start: entry.start, end: entry.end, lieu: entry.lieu, client: entry.client, notes: entry.notes, category: entry.category || "", orSaved: !!entry.orSaved, orNumber: entry.orNumber || "", facturable: entry.facturable !== false, isEditingExisting: true, photos: [], photosLoading: true, photoBusy: false, error: null, saving: false };
  renderForm();
  sbListPhotos(entry.id).then(function (photos) {
    if (!form || form.id !== entry.id) return;
    form.photos = photos; form.photosLoading = false;
    renderPhotoGrid();
  });
}
function closeForm() {
  var modal = document.getElementById("form-modal");
  if (modal) modal.remove();
  form = null;
}
function duplicateFromForm() {
  var lieu = document.getElementById("f-lieu").value;
  var client = document.getElementById("f-client").value;
  var category = document.getElementById("f-category").value;
  var facturable = document.getElementById("f-facturable").checked;
  closeForm();
  form = { id: genId(), date: todayISO(), start: "08:00", end: "17:00", lieu: lieu, client: client, notes: "", category: category, orSaved: false, orNumber: "", facturable: facturable, isEditingExisting: false, photos: [], photosLoading: false, photoBusy: false, error: null, saving: false };
  renderForm();
}

function renderForm() {
  var existing = document.getElementById("form-modal");
  if (existing) existing.remove();

  var wrap = document.createElement("div");
  wrap.id = "form-modal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(10,12,13,0.72);display:flex;align-items:flex-end;z-index:50;";
  wrap.onclick = function (e) { if (e.target === wrap) closeForm(); };

  var panel = document.createElement("div");
  panel.style.cssText = "width:100%;max-width:480px;margin:0 auto;max-height:88vh;overflow-y:auto;background:" + COLORS.surfaceRaised + ";border-top:1px solid " + COLORS.border + ";border-top-left-radius:16px;border-top-right-radius:16px;padding:18px 18px 24px;";
  panel.onclick = function (e) { e.stopPropagation(); };

  var html = '';
  html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  html += '<h2 style="font-family:\'Oswald\',sans-serif;font-size:18px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin:0;">' + (form.isEditingExisting ? "Modifier" : "Nouvelle intervention") + '</h2>';
  html += '<button id="f-close" style="background:transparent;border:none;color:' + COLORS.inkDim + ';padding:4px;font-size:20px;">✕</button></div>';

  html += '<div id="f-error-box"></div>';

  html += '<div style="display:flex;flex-direction:column;gap:12px;">';
  html += '<label class="field"><span>Date</span><input id="f-date" type="date" value="' + esc(form.date) + '"/></label>';
  html += '<div style="display:flex;gap:10px;"><label class="field" style="flex:1;"><span>Début</span><input id="f-start" type="time" value="' + esc(form.start) + '"/></label>';
  html += '<label class="field" style="flex:1;"><span>Fin</span><input id="f-end" type="time" value="' + esc(form.end) + '"/></label></div>';
  html += '<label class="field"><span>Lieu</span><input id="f-lieu" type="text" placeholder="Ex. Chantier rue de la Paix" value="' + esc(form.lieu) + '"/></label>';
  html += '<label class="field"><span>Client</span><input id="f-client" type="text" placeholder="Ex. M. Dupont" value="' + esc(form.client) + '"/></label>';

  html += '<label class="field"><span>Catégorie</span><select id="f-category">';
  html += '<option value="">— Aucune —</option>';
  CATEGORIES.forEach(function (c) {
    html += '<option value="' + esc(c.id) + '"' + (form.category === c.id ? ' selected' : '') + '>' + esc(c.label) + '</option>';
  });
  html += '</select></label>';
  html += '<label class="field"><span>Notes</span><textarea id="f-notes" rows="3" placeholder="Détails de l\'intervention…" style="resize:vertical;">' + esc(form.notes) + '</textarea></label>';

  html += '<label style="display:flex;align-items:center;gap:8px;font-size:13.5px;">';
  html += '<input id="f-or-saved" type="checkbox" style="width:17px;height:17px;accent-color:' + COLORS.amber + ';"' + (form.orSaved ? ' checked' : '') + '/>';
  html += 'OR enregistré sur PC</label>';

  html += '<label class="field"><span>N° OR</span><input id="f-or-number" type="text" placeholder="Ex. 2026-0458" value="' + esc(form.orNumber) + '"/></label>';

  html += '<label style="display:flex;align-items:center;gap:8px;font-size:13.5px;">';
  html += '<input id="f-facturable" type="checkbox" style="width:17px;height:17px;accent-color:' + COLORS.amber + ';"' + (form.facturable ? ' checked' : '') + '/>';
  html += 'Facturable</label>';

  html += '<label class="field"><span id="f-photos-label">Photos</span><div id="f-photos-grid"></div><input id="f-photo-input" type="file" accept="image/*" multiple style="display:none;"/></label>';
  html += '</div>';

  html += '<div style="display:flex;gap:10px;margin-top:20px;">';
  if (form.isEditingExisting) html += '<button id="f-delete" class="btn" style="background:transparent;border:1px solid ' + COLORS.danger + ';color:' + COLORS.danger + ';flex:0 0 auto;">🗑</button>';
  if (form.isEditingExisting) html += '<button id="f-duplicate" class="btn" style="background:transparent;border:1px solid ' + COLORS.teal + ';color:' + COLORS.teal + ';flex:0 0 auto;">📄 Dupliquer</button>';
  html += '<button id="f-save" class="btn" style="background:' + COLORS.amber + ';color:#F2EFE6;flex:1;font-weight:700;">' + (form.isEditingExisting ? "Enregistrer" : "Ajouter") + '</button>';
  html += '</div>';

  panel.innerHTML = html;
  wrap.appendChild(panel);
  document.body.appendChild(wrap);

  document.getElementById("f-close").onclick = closeForm;
  document.getElementById("f-save").onclick = saveForm;
  var delBtn = document.getElementById("f-delete");
  if (delBtn) delBtn.onclick = deleteFromForm;
  var dupBtn = document.getElementById("f-duplicate");
  if (dupBtn) dupBtn.onclick = duplicateFromForm;
  document.getElementById("f-photo-input").onchange = function (e) {
    if (e.target.files && e.target.files.length) handleFiles(e.target.files);
    e.target.value = "";
  };

  renderPhotoGrid();
  renderFormError();
}

function renderFormError() {
  var box = document.getElementById("f-error-box");
  if (!box) return;
  if (form.error) {
    box.innerHTML = '<div style="display:flex;align-items:center;gap:6px;background:rgba(193,85,74,0.12);border:1px solid ' + COLORS.danger + ';color:' + COLORS.danger + ';border-radius:6px;padding:8px 10px;font-size:12.5px;margin-bottom:12px;">⚠️ ' + esc(form.error) + '</div>';
  } else {
    box.innerHTML = '';
  }
}

function renderPhotoGrid() {
  var grid = document.getElementById("f-photos-grid");
  var label = document.getElementById("f-photos-label");
  if (!grid) return;
  var okCount = form.photos.filter(function (p) { return p.status === "ok"; }).length;
  if (label) label.textContent = "Photos" + (form.photos.length ? " (" + okCount + "/" + MAX_PHOTOS + ")" : "");

  if (form.photosLoading) {
    grid.innerHTML = '<div style="font-size:12.5px;color:' + COLORS.inkDim + ';">Chargement des photos…</div>';
    return;
  }

  var html = '<div style="display:flex;flex-wrap:wrap;gap:8px;">';
  form.photos.forEach(function (p) {
    html += '<div style="position:relative;width:72px;height:72px;border-radius:6px;overflow:hidden;border:1px solid ' + (p.status === "error" ? COLORS.danger : COLORS.border) + ';flex-shrink:0;background:#0A2620;">';
    if (p.dataUrl) {
      html += '<button class="photo-thumb" data-uid="' + esc(p.uid) + '" style="width:100%;height:100%;padding:0;border:none;background:transparent;display:block;"><img src="' + esc(p.dataUrl) + '" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;"/></button>';
    } else {
      html += '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;">' + (p.status === "uploading" ? '<span style="font-size:10px;color:' + COLORS.inkDim + ';">…</span>' : '⚠️') + '</div>';
      html += '<button class="photo-remove" data-uid="' + esc(p.uid) + '" style="position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(10,12,13,0.75);border:none;color:#fff;font-size:11px;">✕</button>';
    }
    html += '</div>';
  });
  if (okCount < MAX_PHOTOS) {
    html += '<button id="photo-add" style="width:72px;height:72px;border-radius:6px;border:1px dashed ' + COLORS.border + ';background:transparent;color:' + COLORS.inkDim + ';display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;">' + (form.photoBusy ? '<span style="font-size:10px;">…</span>' : '<span style="font-size:18px;">📷</span><span style="font-size:10px;">Ajouter</span>') + '</button>';
  }
  html += '</div>';
  form.photos.filter(function (p) { return p.status === "error"; }).forEach(function (p) {
    html += '<div style="color:' + COLORS.danger + ';font-size:11.5px;margin-top:4px;">Échec : ' + esc(p.error || "") + '</div>';
  });
  grid.innerHTML = html;

  var addBtn = document.getElementById("photo-add");
  if (addBtn) addBtn.onclick = function () { document.getElementById("f-photo-input").click(); };
  grid.querySelectorAll(".photo-remove").forEach(function (btn) {
    btn.onclick = function () { removePhoto(btn.getAttribute("data-uid")); };
  });
  grid.querySelectorAll(".photo-thumb").forEach(function (btn) {
    btn.onclick = function () { openPhotoActions(btn.getAttribute("data-uid")); };
  });
}

function handleFiles(fileList) {
  var currentOk = form.photos.filter(function (p) { return p.status !== "error"; }).length;
  var files = Array.prototype.slice.call(fileList, 0, Math.max(MAX_PHOTOS - currentOk, 0));
  if (!files.length) return;
  form.photoBusy = true;
  renderPhotoGrid();

  var chain = Promise.resolve();
  files.forEach(function (file) {
    chain = chain.then(function () {
      var uid = genId();
      form.photos.push({ uid: uid, dataUrl: null, status: "uploading" });
      renderPhotoGrid();
      return compressImage(file).then(function (compressed) {
        return sbUploadPhoto(form.id, uid, compressed);
      }).then(function (publicUrl) {
        var p = form.photos.find(function (x) { return x.uid === uid; });
        if (p) { p.dataUrl = publicUrl; p.status = "ok"; }
        renderPhotoGrid();
      }).catch(function (e) {
        var p = form.photos.find(function (x) { return x.uid === uid; });
        if (p) { p.dataUrl = null; p.status = "error"; p.error = (e && e.message) ? e.message : String(e); }
        renderPhotoGrid();
      });
    });
  });
  chain.then(function () { form.photoBusy = false; renderPhotoGrid(); });
}

function removePhoto(uid) {
  var p = form.photos.find(function (x) { return x.uid === uid; });
  form.photos = form.photos.filter(function (x) { return x.uid !== uid; });
  renderPhotoGrid();
  if (p && p.status === "ok") sbDeletePhoto(form.id, uid);
}

function openPhotoActions(uid) {
  var p = form.photos.find(function (x) { return x.uid === uid; });
  if (!p) return;

  var existing = document.getElementById("photo-actions-modal");
  if (existing) existing.remove();

  var wrap = document.createElement("div");
  wrap.id = "photo-actions-modal";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(10,12,13,0.72);display:flex;align-items:flex-end;z-index:60;";
  wrap.onclick = function (e) { if (e.target === wrap) wrap.remove(); };

  var panel = document.createElement("div");
  panel.style.cssText = "width:100%;max-width:480px;margin:0 auto;background:" + COLORS.surfaceRaised + ";border-top:1px solid " + COLORS.border + ";border-top-left-radius:16px;border-top-right-radius:16px;padding:14px;";
  panel.onclick = function (e) { e.stopPropagation(); };

  function actionBtn(label, color) {
    return '<button class="pa-btn" style="width:100%;text-align:left;padding:14px 12px;background:transparent;border:none;border-bottom:1px solid ' + COLORS.border + ';color:' + (color || COLORS.ink) + ';font-size:15px;">' + label + '</button>';
  }
  panel.innerHTML =
    actionBtn("👁️ Visionner", COLORS.ink) +
    actionBtn("⬇️ Enregistrer sur PC", COLORS.ink) +
    actionBtn("🗑 Supprimer", COLORS.danger) +
    '<button id="pa-cancel" style="width:100%;text-align:center;padding:14px 12px;background:transparent;border:none;color:' + COLORS.inkDim + ';font-size:14px;margin-top:4px;">Annuler</button>';

  wrap.appendChild(panel);
  document.body.appendChild(wrap);

  var btns = panel.querySelectorAll(".pa-btn");
  btns[0].onclick = function () { wrap.remove(); openPhotoViewer(p.dataUrl); };
  btns[1].onclick = function () { wrap.remove(); downloadPhoto(p); };
  btns[2].onclick = function () { wrap.remove(); removePhoto(uid); };
  document.getElementById("pa-cancel").onclick = function () { wrap.remove(); };
}

function openPhotoViewer(url) {
  var existing = document.getElementById("photo-viewer");
  if (existing) existing.remove();

  var wrap = document.createElement("div");
  wrap.id = "photo-viewer";
  wrap.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:70;";
  wrap.onclick = function () { wrap.remove(); };

  var img = document.createElement("img");
  img.src = url;
  img.style.cssText = "max-width:92%;max-height:80vh;object-fit:contain;border-radius:6px;";
  img.onclick = function (e) { e.stopPropagation(); };

  var closeBtn = document.createElement("button");
  closeBtn.textContent = "✕";
  closeBtn.style.cssText = "position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:18px;";
  closeBtn.onclick = function () { wrap.remove(); };

  wrap.appendChild(img);
  wrap.appendChild(closeBtn);
  document.body.appendChild(wrap);
}

function downloadPhoto(p) {
  fetch(p.dataUrl)
    .then(function (res) { return res.blob(); })
    .then(function (blob) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = "intervention-photo-" + p.uid + ".jpg";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    })
    .catch(function () {
      // repli : ouvre l'image dans un nouvel onglet si le téléchargement direct échoue
      window.open(p.dataUrl, "_blank");
    });
}

function saveForm() {
  var date = document.getElementById("f-date").value;
  var start = document.getElementById("f-start").value;
  var end = document.getElementById("f-end").value;
  var lieu = document.getElementById("f-lieu").value;
  var client = document.getElementById("f-client").value;
  var category = document.getElementById("f-category").value;
  var notes = document.getElementById("f-notes").value;
  var orSaved = document.getElementById("f-or-saved").checked;
  var orNumber = document.getElementById("f-or-number").value;
  var facturable = document.getElementById("f-facturable").checked;

  if (!date || !start || !end) {
    form.error = "Renseigne au moins la date, l'heure de début et de fin.";
    renderFormError();
    return;
  }
  form.error = null;
  renderFormError();

  var entry = { id: form.id, date: date, start: start, end: end, lieu: lieu, client: client, category: category, notes: notes, orSaved: orSaved, orNumber: orNumber, facturable: facturable };
  var okPhotosCount = form.photos.filter(function (p) { return p.status === "ok"; }).length;

  function saveOffline() {
    var next = state.entries.filter(function (e) { return e.id !== entry.id; });
    next.push(entry);
    state.entries = next;
    state.photoCounts[entry.id] = okPhotosCount;
    saveCache(state.entries);
    queueAdd({ type: "upsert", id: entry.id, payload: entry });
    state.pendingCount = getQueue().length;
    closeForm();
    renderRoot();
  }

  if (!navigator.onLine) {
    saveOffline();
    return;
  }

  sbUpsertEntry(entry).then(function () {
    state.photoCounts[entry.id] = okPhotosCount;
    closeForm();
    loadEntries();
  }).catch(function (e) {
    // échec réseau probable (pas forcément une vraie erreur Supabase) : on passe en file d'attente
    saveOffline();
  });
}

function deleteFromForm() {
  var id = form.id;
  var deletedEntry = state.entries.find(function (e) { return e.id === id; }) || Object.assign({}, form);
  if (!navigator.onLine) {
    state.entries = state.entries.filter(function (e) { return e.id !== id; });
    saveCache(state.entries);
    queueAdd({ type: "delete", id: id });
    state.pendingCount = getQueue().length;
    closeForm();
    renderRoot();
    return;
  }
  sbDeleteEntry(id).then(function () { return sbDeleteAllPhotos(id); }).then(function () {
    closeForm();
    loadEntries();
    if (deletedEntry) showUndoToast(deletedEntry);
  }).catch(function () {
    state.entries = state.entries.filter(function (e) { return e.id !== id; });
    saveCache(state.entries);
    queueAdd({ type: "delete", id: id });
    state.pendingCount = getQueue().length;
    closeForm();
    renderRoot();
  });
}

// --- Démarrage ---
loadEntries();
if (getQueue().length > 0 && navigator.onLine) trySyncPending();

// Écran de lancement : reste affiché le temps que le GIF joue en entier, puis s'efface en douceur
(function () {
  var SPLASH_DURATION_MS = 3600; // réduite encore de 3s
  setTimeout(function () {
    var splash = document.getElementById("splash");
    if (!splash) return;
    splash.style.opacity = "0";
    setTimeout(function () {
      splash.remove();
      if (getPin()) showLockScreen(function () {});
    }, 400);
  }, SPLASH_DURATION_MS);
})();
</script>
