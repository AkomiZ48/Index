function toMinutes(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function durationMinutes(start, end) {
  let diff = toMinutes(end) - toMinutes(start);
  if (diff <= 0) diff += 24 * 60;
  return diff;
}
const OVERTIME_WINDOWS = [
  [11 * 60 + 30, 13 * 60 + 30],
  [16 * 60 + 30, 24 * 60],
];
function overlapMinutes(aStart, aEnd, bStart, bEnd) {
  return Math.max(0, Math.min(aEnd, bEnd) - Math.max(aStart, bStart));
}
function overtimeMinutes(start, end) {
  const startMin = toMinutes(start);
  let endMin = toMinutes(end);
  if (endMin <= startMin) endMin += 24 * 60;
  let total = 0;
  const days = Math.ceil(endMin / (24 * 60)) + 1;
  for (let d = 0; d < days; d++) {
    const offset = d * 24 * 60;
    for (const [ws, we] of OVERTIME_WINDOWS) total += overlapMinutes(startMin, endMin, offset + ws, offset + we);
  }
  return total;
}
function fmtDuration(min) {
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m > 0 ? `${h}h${String(m).padStart(2, "0")}` : `${h}h`;
}
function fmtDateShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");

}
function genId() { return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`; }

}

function compressImage(file, maxDim = 1000, quality = 0.6) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round((height * maxDim) / width); width = maxDim; }
          else { width = Math.round((width * maxDim) / height); height = maxDim; }
        }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("Image illisible"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("Lecture du fichier impossible"));
    reader.readAsDataURL(file);
  });
}
function dataUrlToBlob(dataUrl) {
  const [header, base64] = dataUrl.split(",");
  const mime = (header.match(/data:(.*);base64/) || [])[1] || "image/jpeg";
  const binary = atob(base64);
  const array = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
  return new Blob([array], { type: mime });
}

// --- Accès aux données ---
async function sbFetchEntries() {
  const { data, error } = await supabase
    .from("interventions")
    .select("*")
    .order("date", { ascending: false })
    .order("start_time", { ascending: false });
  if (error) throw error;
  return data.map((row) => ({
    id: row.id, date: row.date, start: row.start_time, end: row.end_time,
    lieu: row.lieu || "", client: row.client || "", notes: row.notes || "",
  }));
}
async function sbUpsertEntry(entry) {
  const { error } = await supabase.from("interventions").upsert({
    id: entry.id, date: entry.date, start_time: entry.start, end_time: entry.end,
    lieu: entry.lieu || null, client: entry.client || null, notes: entry.notes || null,
  });
  if (error) throw error;
}
async function sbDeleteEntry(id) {
  const { error } = await supabase.from("interventions").delete().eq("id", id);
  if (error) throw error;
}
async function sbUploadPhoto(entryId, uid, dataUrl) {
  const blob = dataUrlToBlob(dataUrl);
  const path = `${entryId}/${uid}.jpg`;
  const { error } = await supabase.storage.from(PHOTOS_BUCKET).upload(path, blob, {
    contentType: "image/jpeg", upsert: true,
  });
  if (error) throw error;
  const { data } = supabase.storage.from(PHOTOS_BUCKET).getPublicUrl(path);
  return data.publicUrl;
}
async function sbListPhotos(entryId) {
  const { data, error } = await supabase.storage.from(PHOTOS_BUCKET).list(entryId, { limit: 100 });
  if (error || !data) return [];
  return data.map((it) => {
    const { data: pub } = supabase.storage.from(PHOTOS_BUCKET).getPublicUrl(`${entryId}/${it.name}`);
    return { uid: it.name.replace(/\.jpg$/, ""), dataUrl: pub.publicUrl, status: "ok" };
  });
}
async function sbDeletePhoto(entryId, uid) {
  await supabase.storage.from(PHOTOS_BUCKET).remove([`${entryId}/${uid}.jpg`]).catch(() => {});
}
async function sbDeleteAllPhotos(entryId) {
  const photos = await sbListPhotos(entryId);
  if (photos.length) await supabase.storage.from(PHOTOS_BUCKET).remove(photos.map((p) => `${entryId}/${p.uid}.jpg`));
}

}

            {entry.client && <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><Icon size={12}>👤</Icon>{entry.client}</span>}

        </div>
      ) : (
        <button onClick={() => onDeleteRequest(entry.id)} style={{ display: "flex", alignItems: "center", justifyContent: "center", padding: "0 12px", background: "transparent", border: "none", borderLeft: `1px solid ${COLORS.border}`, cursor: "pointer", color: COLORS.inkDim, fontSize: 15 }}>🗑</button>

function FormSheet({ form, setForm, onSave, onClose, onDelete, isEdit, error, photosLoading }) {
  const [photoBusy, setPhotoBusy] = useState(false);
  const handleFiles = async (fileList) => {
    const currentOk = (form.photos || []).filter((p) => p.status !== "error").length;
    const files = Array.from(fileList).slice(0, Math.max(MAX_PHOTOS - currentOk, 0));
    if (!files.length) return;
    setPhotoBusy(true);
    for (const file of files) {
      const uid = genId();
      setForm((prev) => ({ ...prev, photos: [...(prev.photos || []), { uid, dataUrl: null, status: "uploading" }] }));
      try {
        const compressed = await compressImage(file);
        const publicUrl = await sbUploadPhoto(form.id, uid, compressed);
        setForm((prev) => ({ ...prev, photos: (prev.photos || []).map((p) => p.uid === uid ? { uid, dataUrl: publicUrl, status: "ok" } : p) }));
      } catch (e) {
        setForm((prev) => ({ ...prev, photos: (prev.photos || []).map((p) => p.uid === uid ? { uid, dataUrl: null, status: "error", error: e.message || String(e) } : p) }));
      }
    }
    setPhotoBusy(false);
  };
  const handleRemovePhoto = (uid) => {
    const photo = (form.photos || []).find((p) => p.uid === uid);
    setForm((prev) => ({ ...prev, photos: (prev.photos || []).filter((p) => p.uid !== uid) }));
    if (photo?.status === "ok") sbDeletePhoto(form.id, uid);
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(10,12,13,0.72)", display: "flex", alignItems: "flex-end", zIndex: 50 }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ width: "100%", maxWidth: 480, margin: "0 auto", maxHeight: "88vh", overflowY: "auto", background: COLORS.surfaceRaised, borderTop: `1px solid ${COLORS.border}`, borderTopLeftRadius: 16, borderTopRightRadius: 16, padding: "18px 18px 24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <h2 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 18, fontWeight: 600, color: COLORS.ink, textTransform: "uppercase", letterSpacing: "0.04em", margin: 0 }}>{isEdit ? "Modifier" : "Nouvelle intervention"}</h2>
          <button onClick={onClose} style={{ background: "transparent", border: "none", color: COLORS.inkDim, cursor: "pointer", padding: 4, fontSize: 20 }}>✕</button>
        </div>
        {error && <div style={{ display: "flex", alignItems: "center", gap: 6, background: "rgba(193,85,74,0.12)", border: `1px solid ${COLORS.danger}`, color: COLORS.danger, borderRadius: 6, padding: "8px 10px", fontFamily: "'Inter', sans-serif", fontSize: 12.5, marginBottom: 12 }}><Icon size={14}>⚠️</Icon>{error}</div>}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Field label="Date"><input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} style={inputStyle} /></Field>
          <div style={{ display: "flex", gap: 10 }}>
            <Field label="Début" style={{ flex: 1 }}><input type="time" value={form.start} onChange={(e) => setForm({ ...form, start: e.target.value })} style={inputStyle} /></Field>
            <Field label="Fin" style={{ flex: 1 }}><input type="time" value={form.end} onChange={(e) => setForm({ ...form, end: e.target.value })} style={inputStyle} /></Field>
          </div>
          <Field label="Lieu"><input type="text" placeholder="Ex. Chantier rue de la Paix" value={form.lieu} onChange={(e) => setForm({ ...form, lieu: e.target.value })} style={inputStyle} /></Field>
          <Field label="Client"><input type="text" placeholder="Ex. M. Dupont" value={form.client} onChange={(e) => setForm({ ...form, client: e.target.value })} style={inputStyle} /></Field>
          <Field label="Notes"><textarea placeholder="Détails de l'intervention…" value={form.notes} onChange={(e) => setForm({ ...form, notes: e.target.value })} rows={3} style={{ ...inputStyle, resize: "vertical", fontFamily: "'Inter', sans-serif" }} /></Field>
          <PhotoField photos={form.photos || []} busy={photoBusy} loading={photosLoading} onFiles={handleFiles} onRemove={handleRemovePhoto} />
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          {isEdit && <button onClick={onDelete} style={{ ...btnStyle, background: "transparent", border: `1px solid ${COLORS.danger}`, color: COLORS.danger, flex: "0 0 auto" }}>🗑</button>}
          <button onClick={onSave} style={{ ...btnStyle, background: COLORS.amber, color: "#F2EFE6", flex: 1, fontWeight: 700 }}>{isEdit ? "Enregistrer" : "Ajouter"}</button>
        </div>
      </div>
    </div>
  );
}

function CarnetInterventions() {
  const [entries, setEntries] = useState([]);
  const [photoCounts, setPhotoCounts] = useState({});
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(emptyForm());
  const [formError, setFormError] = useState(null);
  const [pendingDeleteId, setPendingDeleteId] = useState(null);
  const [isEditingExisting, setIsEditingExisting] = useState(false);
  const [photosLoading, setPhotosLoading] = useState(false);

  const loadEntries = async () => {
    setLoading(true); setLoadError(null);
    try {
      const rows = await sbFetchEntries();
      setEntries(rows);
      Promise.all(rows.map(async (r) => [r.id, (await sbListPhotos(r.id)).length]))
        .then((pairs) => setPhotoCounts(Object.fromEntries(pairs)));
    } catch (e) {
      setLoadError(e.message || String(e));
    } finally {
      setLoading(false);
    }
  };
  useEffect(() => { loadEntries(); }, []);

  const openNew = () => { setForm({ ...emptyForm(), id: genId() }); setFormError(null); setIsEditingExisting(false); setShowForm(true); };
  const openEdit = (entry) => {
    setForm({ ...entry, photos: [] }); setFormError(null); setIsEditingExisting(true); setShowForm(true); setPhotosLoading(true);
    sbListPhotos(entry.id).then((photos) => { setForm((prev) => prev.id === entry.id ? { ...prev, photos } : prev); setPhotosLoading(false); });
  };
  const closeForm = () => { setShowForm(false); setFormError(null); };

  const saveEntry = async () => {
    if (!form.date || !form.start || !form.end) { setFormError("Renseigne au moins la date, l'heure de début et de fin."); return; }
    setFormError(null);
    const { photos = [], ...rest } = form;
    try {
      await sbUpsertEntry(rest);
      setPhotoCounts((prev) => ({ ...prev, [rest.id]: photos.filter((p) => p.status === "ok").length }));
      await loadEntries();
      setIsEditingExisting(true);
      setShowForm(false);
    } catch (e) {
      setFormError(`L'enregistrement a échoué. Détail : ${e.message || String(e)}`);
    }
  };

  const deleteFromForm = async () => {
    try { await sbDeleteEntry(form.id); await sbDeleteAllPhotos(form.id); await loadEntries(); setShowForm(false); }
    catch (e) { setFormError(`La suppression a échoué. Détail : ${e.message || String(e)}`); }
  };
  const confirmDelete = async (id) => {
    try { await sbDeleteEntry(id); await sbDeleteAllPhotos(id); await loadEntries(); } catch (e) { console.error(e); }
    setPendingDeleteId(null);
  };

  const totalMinutes = useMemo(() => entries.reduce((s, e) => s + durationMinutes(e.start, e.end), 0), [entries]);
  const totalOvertimeMinutes = useMemo(() => entries.reduce((s, e) => s + overtimeMinutes(e.start, e.end), 0), [entries]);
  const grouped = useMemo(() => {
    const map = {};
    for (const e of entries) { const key = monthKey(e.date); (map[key] = map[key] || []).push(e); }
    return Object.keys(map).sort((a, b) => (a < b ? 1 : -1)).map((key) => {
      const list = map[key].sort((a, b) => a.date !== b.date ? (a.date < b.date ? 1 : -1) : (a.start < b.start ? 1 : -1));
      const subtotal = list.reduce((s, e) => s + durationMinutes(e.start, e.end), 0);
      return { key, list, subtotal };
    });
  }, [entries]);

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, color: COLORS.ink, fontFamily: "'Inter', sans-serif", paddingBottom: 100 }}>
      <div style={{ maxWidth: 480, margin: "0 auto", padding: "20px 16px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18, gap: 12 }}>
          <div>
            <div style={{ fontFamily: "'Oswald', sans-serif", fontSize: 12, letterSpacing: "0.22em", color: COLORS.teal, textTransform: "uppercase", marginBottom: 4 }}>Carnet de bord</div>
            <h1 style={{ fontFamily: "'Oswald', sans-serif", fontSize: 26, fontWeight: 700, margin: 0, color: COLORS.ink }}>Mes interventions</h1>
          </div>
          <div style={{ flexShrink: 0, display: "flex", alignItems: "center", gap: 6, background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 8, padding: "6px 10px" }}>
            <svg width="14" height="26" viewBox="0 0 14 26"><polygon points="0,0 14,0 4,26 0,26" fill={COLORS.amber} /></svg>
            <div style={{ display: "flex", flexDirection: "column", lineHeight: 1 }}>
              <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 15, color: COLORS.ink }}>DMP</span>
              <span style={{ fontFamily: "'Oswald', sans-serif", fontWeight: 700, fontSize: 15, color: COLORS.ink, marginTop: 1 }}>LOC</span>
            </div>
          </div>
        </div>

        {loadError && (
          <div style={{ display: "flex", alignItems: "flex-start", gap: 8, background: "rgba(193,85,74,0.14)", border: `1px solid ${COLORS.danger}`, color: COLORS.danger, borderRadius: 8, padding: "10px 12px", fontSize: 12, marginBottom: 14, lineHeight: 1.4 }}>
            <Icon size={15}>⚠️</Icon>
            <div style={{ flex: 1 }}>Connexion à la base impossible : {loadError}
              <button onClick={loadEntries} style={{ display: "block", marginTop: 6, background: "transparent", border: `1px solid ${COLORS.danger}`, color: COLORS.danger, borderRadius: 5, padding: "4px 8px", fontSize: 11.5, cursor: "pointer" }}>Réessayer</button>
            </div>
          </div>
        )}

        {loading ? (
          <div style={{ color: COLORS.inkDim, padding: "40px 0", textAlign: "center" }}>Chargement…</div>
        ) : (
          <>
            <div style={{ display: "flex", gap: 10 }}>
              <HourMeter totalMinutes={totalMinutes} label="Total cumulé" color={COLORS.tealLight} hourDigits={4} />
              <HourMeter totalMinutes={totalOvertimeMinutes} label="Heures sup." color={COLORS.amberLight} hourDigits={3} />
            </div>
            <div style={{ marginTop: 24, display: "flex", flexDirection: "column", gap: 22 }}>
              {entries.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 16px", color: COLORS.inkDim, border: `1px dashed ${COLORS.border}`, borderRadius: 10 }}>
                  <div style={{ fontSize: 28, marginBottom: 10 }}>⏰</div>
                  <div style={{ fontSize: 14 }}>Aucune intervention enregistrée.<br />Ajoute la première avec le bouton +.</div>
                </div>
              ) : grouped.map(({ key, list, subtotal }) => (
                <div key={key}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8, paddingBottom: 6, borderBottom: `1px solid ${COLORS.border}` }}>
                    <span style={{ fontFamily: "'Oswald', sans-serif", fontSize: 13, letterSpacing: "0.06em", color: COLORS.teal, textTransform: "uppercase" }}>{monthLabel(key)}</span>
                    <span style={{ fontFamily: "'Space Mono', monospace", fontSize: 13, color: COLORS.inkDim }}>{fmtDuration(subtotal)}</span>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {list.map((entry) => (
                      <Ticket key={entry.id} entry={entry} photoCount={photoCounts[entry.id] || 0} onEdit={openEdit} onDeleteRequest={setPendingDeleteId} pendingDelete={pendingDeleteId === entry.id} onConfirmDelete={confirmDelete} onCancelDelete={() => setPendingDeleteId(null)} />
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </>
        )}
      </div>
      <button onClick={openNew} style={{ position: "fixed", bottom: 24, right: 24, width: 58, height: 58, borderRadius: "50%", background: COLORS.amber, border: "none", color: "#F2EFE6", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 6px 18px rgba(232,149,47,0.4)", cursor: "pointer", fontSize: 26 }}>＋</button>
      {showForm && <FormSheet form={form} setForm={setForm} onSave={saveEntry} onClose={closeForm} onDelete={deleteFromForm} isEdit={isEditingExisting} error={formError} photosLoading={photosLoading} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CarnetInterventions />);
</script>
</body>
</html>
